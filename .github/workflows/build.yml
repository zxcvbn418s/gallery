name: Build Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Flutter APK on Ubuntu
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4.5.0
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2.18.0
        with:
          channel: 'stable'

      - name: Create Missing Flutter Project Files
        run: |
          flutter create --platforms android .
          rm -f android/app/src/main/AndroidManifest.xml

      - name: Restore Launcher AndroidManifest
        run: |
          git checkout HEAD -- android/app/src/main/AndroidManifest.xml || true

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-shrink

      - name: Upload APK
        uses: actions/upload-artifact@v4.5.0
        with:
          name: ios-launcher-apk
          path: build/app/outputs/flutter-apk/app-release.apk
